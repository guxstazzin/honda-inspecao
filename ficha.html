<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Técnica - Honda App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0056b3; --blue-dark: #003d82; --ok: #10b981; --nc: #ef4444; --bg: #f3f4f6; --text-main: #1f2937; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            cursor: default;
        }

        .item-texto, .titulo-secao, label { cursor: not-allowed; }

        #img-modal-dinamica {
            pointer-events: none;
            -webkit-user-drag: none;
            user-select: none;
            width: 100%;
            display: block;
        }

        @media print { body { display: none !important; } }
        
        #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--blue-dark), var(--blue)); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { font-family: 'Montserrat', sans-serif; color: var(--blue-dark); margin-top: 0; letter-spacing: 1px; text-transform: uppercase; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; background: #f8fafc; }
        .login-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(0,86,179,0.1); background: white; }
        .btn-logar { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: white; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,86,179,0.3); }
        .link-cadastro { margin-top: 15px; display: block; font-size: 14px; color: var(--blue); text-decoration: none; font-weight: 600; cursor: pointer; }
        
        .tela-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 30, 70, 0.95); z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.2); border-top-color: var(--ok); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-tit { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 1px; margin: 0 0 10px 0; }

        #tela-home-inspetor { display: none; text-align: center; padding-top: 40px; }
        .btn-setor { background: white; border: 3px solid var(--blue); padding: 40px 20px; border-radius: 24px; cursor: pointer; transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; margin: 0 auto 30px auto; }
        .btn-setor:hover { transform: translateY(-5px); background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }
        .btn-setor h2 { font-size: 2rem; margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; }

        #app-conteudo { display: none; padding-bottom: 120px; }
        .header { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: white; padding: 25px 20px; text-align: center; position: sticky; top: 0; z-index: 50; }
        .header h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        
        .card { background: white; margin: 20px 15px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        label { font-size: 12px; font-weight: 700; color: #6b7280; display: block; margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px 16px; margin-bottom: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 16px; background: #f8fafc; outline: none; box-sizing: border-box;}
        
        .titulo-secao { padding: 12px 20px; font-weight: 800; color: var(--blue-dark); border-left: 6px solid var(--blue); margin: 30px 15px 15px 15px; background: #eff6ff; text-transform: uppercase; font-size: 0.9rem; }
        
        .item { background: white; margin: 12px 15px; padding: 20px; border-radius: 16px; border-left: 6px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-texto { font-size: 14px; font-weight: 700; color: #334155; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .item-unidade { font-size: 11px; color: #94a3b8; font-weight: 500; }
        
        .input-valor { text-align: center; font-weight: 800; margin-bottom: 0 !important; width: 100px !important; }
        .fora-tolerancia { border-color: var(--nc) !important; color: var(--nc); }
        .dentro-tolerancia { border-color: var(--ok) !important; color: var(--ok); }
        
        .btn-status { border: 2px solid #e2e8f0; font-weight: 800; background: #f8fafc; width: 45px; height: 35px; border-radius: 6px; cursor: pointer; }
        .active-c { background: var(--ok) !important; color: white !important; border-color: transparent !important; }
        .active-nc { background: var(--nc) !important; color: white !important; border-color: transparent !important; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 0 25px 0; border-top: 1px solid #e2e8f0; text-align: center; }
        .btn-env { background: var(--blue-dark); color: white; border: none; padding: 18px; width: 90%; max-width: 400px; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader-geral" class="tela-loading">
        <div class="spinner"></div>
        <p class="loading-tit">SINCRONIZANDO DADOS...</p>
    </div>

    <div id="tela-login">
        <div class="login-box" id="box-login">
            <h2>Acesso ao Sistema</h2>
            <input type="text" id="login-mat" class="login-input" placeholder="Matrícula (Ex: SB12345)" oninput="this.value = this.value.toUpperCase()">
            <input type="password" id="login-senha" class="login-input" placeholder="Sua Senha">
            <button class="btn-logar" onclick="fazerLogin()">Entrar na Ficha</button>
            <span class="link-cadastro" onclick="alternarTelas('box-cadastro')">Primeiro acesso? Cadastre-se</span>
        </div>

        <div class="login-box" id="box-cadastro" style="display: none;">
            <h2>Novo Inspetor</h2>
            <input type="text" id="cad-nome" class="login-input" placeholder="Nome Completo">
            <input type="text" id="cad-mat" class="login-input" placeholder="Matrícula (Ex: SB12345)" oninput="this.value = this.value.toUpperCase()">
            <input type="password" id="cad-senha" class="login-input" placeholder="Crie uma Senha">
            <select id="cad-setor" class="login-input">
                <option value="" disabled selected>Selecione sua Área...</option>
                <option value="LPDC">Setor: LPDC</option>
                <option value="HPDC">Setor: HPDC</option>
            </select>
            <button class="btn-logar" onclick="fazerCadastro()" style="background: var(--ok);">Criar Acesso</button>
            <span class="link-cadastro" onclick="alternarTelas('box-login')">⬅ Voltar</span>
        </div>
    </div>

    <div id="tela-home-inspetor">
        <div class="header"><h1>HONDA</h1><div id="txt-bemvindo-home"></div></div>
        <h2 style="color: var(--blue-dark); margin-top: 40px;">QUAL SETOR VOCÊ VAI INSPECIONAR?</h2>
        <div class="btn-setor" onclick="entrarNoSetor('LPDC')"><h2>LPDC</h2><p>Low Press Die Cast</p></div>
        <div class="btn-setor" onclick="entrarNoSetor('HPDC')"><h2>HPDC</h2><p>High Pressure Die Cast</p></div>
    </div>

    <div id="app-conteudo">
        <div class="header">
            <span style="position: absolute; left: 15px; top: 25px; cursor: pointer; font-size: 24px;" onclick="voltarParaHome()">⬅️</span>
            <h1 id="titulo-ficha-header">Ficha de Inspeção</h1>
            <div id="txt-bemvindo"></div>
        </div>
        
        <div class="card">
            <label>Máquina / Setor</label>
            <select id="inj" onchange="atualizarTemplate()"></select>
            <label>Modelo da Peça</label>
            <select id="mod" onchange="atualizarTemplate()">
                <option value="K2GF">K2GF</option>
                <option value="K1SG">K1SG</option>
                <option value="K68L">K68L</option>
                <option value="KVK">KVK</option>
                <option value="KVSP">KVSP (ASTEC)</option>
                <option value="KRET">KRET (ASTEC)</option>
            </select>
            <label>Matriz / Cavidade *</label>
            <input type="text" id="matriz" placeholder="Ex: #1, #2..." style="text-transform: uppercase;">
            <div style="display:flex; gap:12px;">
                <select id="tur" style="flex:1" disabled><option value="1">1º Turno</option><option value="2">2º Turno</option><option value="3">3º Turno</option></select>
                <select id="insp" style="flex:1"><option value="1">1ª Inspeção</option><option value="2" disabled>2ª Inspeção 🔒</option></select>
            </div>
        </div>
        
        <div id="lista-corpo"></div>

        <div class="card">
            <label>Operador do Processo 1 *</label>
            <input type="text" id="op1" placeholder="Nome do Operador Principal">
            <label>Sua Assinatura Digital *</label>
            <div id="area-canvas">
                <canvas id="pad-assinatura" width="300" height="120" style="border: 2px dashed #94a3b8; border-radius: 12px; background: #fff; width: 100%;"></canvas>
                <button onclick="limparCanvas()" style="margin-top:5px; padding: 5px 15px; border-radius: 8px; border: none; background: #e2e8f0;">Limpar</button>
            </div>
            <div id="area-imagem-salva" style="display: none;"><img id="img-assinatura" style="max-height: 80px;"></div>
        </div>

        <div class="footer"><button id="btn-salvar" class="btn-env" onclick="enviar()">SALVAR INSPEÇÃO</button></div>
    </div>

    <div id="modalVisualizadorItem" style="display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div style="background: white; width: 95%; max-width: 500px; border-radius: 12px; overflow: hidden;">
            <div style="background: var(--blue-dark); color: white; padding: 15px; display: flex; justify-content: space-between;">
                <h3 id="titulo-foto-item" style="margin: 0; font-size: 14px;">PADRÃO VISUAL</h3>
                <span style="cursor:pointer;" onclick="fecharFotoItem()">[X]</span>
            </div>
            <div style="padding: 10px; text-align: center;">
                <img id="img-modal-dinamica" src="">
                <p style="font-size: 11px; color: #ef4444; font-weight: bold; margin-top: 10px;">PROIBIDO DOWNLOAD</p>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://gestao-a-vista-r9uv.onrender.com";
    const headersConfig = { 'ngrok-skip-browser-warning': '69420', 'Content-Type': 'application/json' };
    
    let nomeInspetorLogado = ""; let matriculaInspetorLogado = ""; let assinaturaBase64 = ""; 
    let setorAutorizadoDoInspetor = ""; let dadosFicha = {};

    const canvas = document.getElementById('pad-assinatura'); const ctx = canvas.getContext('2d'); let desenhando = false;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#003d82';
    canvas.addEventListener('mousedown', (e) => { desenhando = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', (e) => { if(desenhando){ ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }});
    canvas.addEventListener('mouseup', () => desenhando = false);
    function limparCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    const TEMPLATES = {
        LPDC_PADRAO: [
            { sec: "Parâmetros de Processo" },
            { t: "Temperatura do Molde", u: "330-390°C", min: 330, max: 390, img: "https://github.com/guxstazzin/honda-inspecao/blob/main/temp%20molde.png?raw=true" },
            { t: "Temperatura do Banho", u: "685-710°C", min: 685, max: 710, img: "https://github.com/guxstazzin/honda-inspecao/blob/main/temp%20banho.png?raw=true" },
            { t: "Tempo de Pressurização", u: "190-210 seg", min: 190, max: 210, img: "https://github.com/guxstazzin/honda-inspecao/blob/main/temp%20pressur.png?raw=true" },
            { sec: "Qualidade Visual" },
            { t: "Aspecto Geral", u: "Visual", tipo: "bin" },
            { t: "Logotipo Honda", u: "Legível", tipo: "bin", img: "https://github.com/guxstazzin/honda-inspecao/blob/main/logotipo.png?raw=true" }
        ],
        // Adicione outros templates aqui conforme necessário
    };

    function alternarTelas(id) { document.getElementById('box-login').style.display = 'none'; document.getElementById('box-cadastro').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function mostrarLoader() { document.getElementById('loader-geral').style.display = 'flex'; }
    function esconderLoader() { document.getElementById('loader-geral').style.display = 'none'; }

    function fazerLogin() {
        let mat = document.getElementById('login-mat').value.trim().toUpperCase();
        let senha = document.getElementById('login-senha').value;
        if(!mat.startsWith('SB')) return alert("Matrícula Inválida");
        mostrarLoader();
        fetch(`${API_URL}/login`, { method: 'POST', headers: headersConfig, body: JSON.stringify({matricula: mat, senha: senha}) })
        .then(async r => {
            esconderLoader();
            const res = await r.json();
            if(r.ok) { 
                nomeInspetorLogado = res.nome; matriculaInspetorLogado = mat; 
                setorAutorizadoDoInspetor = res.setor; 
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-home-inspetor').style.display = 'block';
                document.getElementById('txt-bemvindo-home').textContent = `BEM-VINDO, ${nomeInspetorLogado}`;
            } else alert(res.erro);
        }).catch(() => { esconderLoader(); alert("Servidor Offline"); });
    }

    function entrarNoSetor(setor) {
        if(setorAutorizadoDoInspetor !== setor) return alert("Acesso Negado para esta área.");
        document.getElementById('tela-home-inspetor').style.display = 'none';
        document.getElementById('app-conteudo').style.display = 'block';
        const sel = document.getElementById('inj'); sel.innerHTML = "";
        
        if(setor === "LPDC") {
            const lpdcs = [4, 5, 6, 7, 9, 11, 12, 13, 14, 15, 16];
            lpdcs.forEach(i => sel.innerHTML += `<option value="${i}">LPDC - MAQ ${i}</option>`);
        } else {
            const hpdcs = [2, 7, 8, 9, 12, 13, 15, 16, 17, 18, 19, 20, 21, 22];
            hpdcs.forEach(i => sel.innerHTML += `<option value="HPDC${i}">INJ. ${i}</option>`);
        }
        atualizarTemplate();
    }

    function atualizarTemplate() {
        const corpo = document.getElementById('lista-corpo'); corpo.innerHTML = ""; dadosFicha = {};
        const template = TEMPLATES.LPDC_PADRAO; // Use lógica de modelo aqui depois
        
        template.forEach((it, i) => {
            if(it.sec) return corpo.innerHTML += `<div class="titulo-secao">${it.sec}</div>`;
            dadosFicha[i] = { nome: it.t, status: "Pendente" };
            corpo.innerHTML += `
                <div class="item">
                    <div class="item-header">
                        <div onclick="abrirFotoItem('${it.t}', '${it.img}')" class="item-texto">${it.t} 📷<br><span class="item-unidade">${it.u}</span></div>
                        ${it.min !== undefined ? 
                            `<input type="number" class="input-valor" oninput="validar(${i}, this, ${it.min}, ${it.max})">` : 
                            `<div style="display:flex;gap:5px;"><button class="btn-status" onclick="setBin(${i},'C',this)">C</button><button class="btn-status" onclick="setBin(${i},'NC',this)">NC</button></div>`}
                    </div>
                </div>`;
        });
    }

    function validar(id, el, min, max) {
        const v = parseFloat(el.value);
        const ok = v >= min && v <= max;
        el.className = "input-valor " + (ok ? "dentro-tolerancia" : "fora-tolerancia");
        dadosFicha[id].status = ok ? "C" : "NC"; dadosFicha[id].valor = v;
    }

    function setBin(id, s, btn) {
        dadosFicha[id].status = s; dadosFicha[id].valor = s;
        btn.parentElement.querySelectorAll('button').forEach(b => b.className = "btn-status");
        btn.className = "btn-status " + (s === 'C' ? "active-c" : "active-nc");
    }

    function abrirFotoItem(n, l) {
        document.getElementById('titulo-foto-item').textContent = n;
        document.getElementById('img-modal-dinamica').src = l || "";
        document.getElementById('modalVisualizadorItem').style.display = 'flex';
    }
    function fecharFotoItem() { document.getElementById('modalVisualizadorItem').style.display = 'none'; }
    function voltarParaHome() { document.getElementById('app-conteudo').style.display = 'none'; document.getElementById('tela-home-inspetor').style.display = 'block'; }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === "p" || e.key === "s") || e.keyCode === 123) e.preventDefault(); });
</script>
</body>
</html>

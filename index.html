<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Qualidade - Centro de Comando</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --blue: #0056b3; --blue-dark: #003d82; --ok: #10b981; --nc: #ef4444; --bg: #f3f4f6; --text-main: #1f2937; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; padding-bottom: 50px; }
        
        /* Cabeçalho Clássico */
        .header { background: var(--blue-dark); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #a5f3fc; font-weight: bold; }

        /* Botões Iniciais */
        #tela-home { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 60px; padding: 0 20px; flex-wrap: wrap; }
        .btn-setor { background: white; border: 3px solid var(--blue); padding: 40px 30px; border-radius: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 250px; text-align: center; }
        .btn-setor:hover { transform: translateY(-5px); background: var(--blue); color: white; border-color: transparent; }
        .btn-setor h2 { font-size: 2rem; margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; }
        .btn-setor p { font-size: 1rem; font-weight: 600; margin: 0; color: #64748b; }
        .btn-setor:hover p { color: #e2e8f0; }

        #area-dashboard { display: none; }
        .btn-voltar { margin: 20px 0 20px 30px; padding: 10px 20px; background: #e2e8f0; color: var(--text-main); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        /* KPIs Simples */
        #resumo-topo { display: flex; gap: 15px; padding: 0 30px 20px 30px; max-width: 1600px; margin: 0 auto; flex-wrap: wrap;}
        .kpi-card { background: white; flex: 1; min-width: 200px; padding: 20px; border-radius: 8px; border: 1px solid #ccc; text-align: center;}
        .kpi-card h3 { margin: 0; font-size: 12px; color: #666; text-transform: uppercase; }
        .kpi-card h2 { margin: 5px 0 0 0; font-size: 2rem; color: var(--blue-dark); font-family: 'Montserrat', sans-serif; }

        /* 🔥 O GRANDE RETORNO: TELA DIVIDIDA 🔥 */
        .container-colunas { display: flex; gap: 30px; padding: 0 30px; max-width: 1600px; margin: 0 auto; }
        .coluna-metade { flex: 1; background: #eaeff5; padding: 20px; border-radius: 8px; border: 1px solid #c0c8d1; }
        .titulo-coluna { font-size: 1.2rem; color: var(--blue-dark); font-weight: 900; font-family: 'Montserrat', sans-serif; margin-top: 0; border-bottom: 3px solid var(--blue); padding-bottom: 10px; text-align: center;}
        
        /* Grelha Interna de cada Coluna */
        .grid-interna { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }

        /* Card Raiz */
        .card-maq { background: white; border-radius: 6px; padding: 15px; border: 1px solid #ccc; cursor: pointer; border-left: 6px solid #ccc; transition: 0.1s;}
        .card-maq:hover { border-color: var(--blue); background: #f8fafc; }
        .stat-ok-border { border-left-color: var(--ok); }
        .stat-nc-border { border-left-color: var(--nc); }

        .maq-nome { font-size: 1.2rem; font-weight: 800; color: var(--blue-dark); }
        .maq-modelo { font-size: 12px; background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-weight: bold; float: right; color: var(--blue-dark); }
        .linha-info { font-size: 12px; color: #444; margin-top: 8px; display: flex; justify-content: space-between; }
        
        .s-ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 11px; flex: 1;}
        .s-nc { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 11px; flex: 1;}
        
        .btn-float-quadro { position: fixed; bottom: 30px; right: 30px; background: var(--blue); color: white; border: none; padding: 15px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; font-size: 14px;}
        .btn-float-quadro:hover { background: var(--blue-dark); }

        /* Modais */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 40px auto; width: 90%; max-width: 800px; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { background: var(--blue-dark); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .modal-header h2 { margin: 0; font-size: 1.2rem; font-family: 'Montserrat', sans-serif; }
        .close { color: white; font-size: 24px; cursor: pointer; font-weight: bold;} 
        
        .card-grande.Azul { background: var(--blue); color: white; height: 100px; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: bold; cursor:pointer; border-radius:8px; border: 2px solid var(--blue-dark);}
        
        .grid-turnos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .btn-insp { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; color: white; font-size: 12px; display: flex; justify-content: space-between; align-items: center;}
        .btn-feito { background: var(--ok); } .btn-pendente { background: var(--nc); }

        .info-ficha { background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #ccc; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; margin-bottom: 15px;}
        .chefia-container { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; background: white;}
        .chefia-box { flex: 1; border-right: 1px solid #ccc; text-align: center; display: flex; flex-direction: column;} .chefia-box:last-child { border-right: none; }
        .chefia-tit { background: #eee; padding: 6px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #ccc; }
        .chefia-val { padding: 10px; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-direction: column;}
        
        .valor-lido { color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 13px; }
        .btn-editar { background: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; margin-right: 10px;}
        
    </style>
</head>
<body>
    
    <div class="header">
        <div>
            <h1>HONDA</h1>
            <p>GESTÃO À VISTA - FUNDIÇÃO</p>
        </div>
    </div>

    <div id="tela-home">
        <div class="btn-setor" onclick="abrirSetor('LPDC')">
            <h2>LPDC</h2>
            <p>Baixa Pressão</p>
        </div>
        <div class="btn-setor" onclick="abrirSetor('HPDC')">
            <h2>HPDC</h2>
            <p>Alta Pressão</p>
        </div>
    </div>

    <div id="area-dashboard">
        <button class="btn-voltar" onclick="voltarTela()">⬅ Voltar</button>
        
        <div id="resumo-topo">
            <div class="kpi-card"><h3>Total Máquinas</h3><h2 id="num-total">0</h2></div>
            <div class="kpi-card"><h3>Operação OK</h3><h2 id="num-ok" style="color:var(--ok);">0</h2></div>
            <div class="kpi-card"><h3>Com Pendência</h3><h2 id="num-nc" style="color:var(--nc);">0</h2></div>
        </div>

        <!-- 🔥 ESTRUTURA DE COLUNAS DIVIDIDAS (LPDC ESQUERDA / MACHEIRA DIREITA) 🔥 -->
        <div class="container-colunas" id="layout-duplo" style="display: none;">
            <div class="coluna-metade">
                <h2 class="titulo-coluna">LPDC</h2>
                <div class="grid-interna" id="painel-lpdc"></div>
            </div>
            <div class="coluna-metade">
                <h2 class="titulo-coluna">MACHEIRA</h2>
                <div class="grid-interna" id="painel-mach"></div>
            </div>
        </div>

        <!-- Painel Unico (Para HPDC ou Histórico) -->
        <div class="container-colunas" id="layout-unico" style="display: none; padding-top: 10px;">
            <div style="width: 100%;">
                <h2 class="titulo-coluna" id="tit-unico" style="display:none;">MÁQUINAS</h2>
                <div class="grid-interna" id="painel-unico" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));"></div>
            </div>
        </div>

        <button class="btn-float-quadro" onclick="abrirModalQuadroFisico()">ATUALIZAR QUADRO</button>
    </div>

    <!-- Modais (Turnos, Ficha, Quadro) -->
    <div id="modalTurnos" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header"><h2>Resumo do Dia</h2><span class="close" onclick="document.getElementById('modalTurnos').style.display='none'">&times;</span></div>
            <div class="grid-turnos" id="grid-turnos-corpo"></div>
        </div>
    </div>

    <div id="modalFicha" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="m-tit">Ficha</h2>
                <div>
                    <button class="btn-editar" onclick="editarFichaChefe()">EDITAR</button>
                    <span class="close" onclick="document.getElementById('modalFicha').style.display='none'">&times;</span>
                </div>
            </div>
            <div style="padding:20px;">
                <div id="topo-ficha-print"></div>
                <div style="display:flex; gap:20px; border-top:1px solid #ccc; padding-top:15px; margin-top:15px;">
                    <div style="flex:1" id="p1"></div><div style="flex:1" id="p2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalQuadroFisico" class="modal">
        <div class="modal-content" style="max-width: 900px; background: #f8fafc;">
            <div class="modal-header"><h2>Atualizar Quadro Manual</h2><span class="close" onclick="document.getElementById('modalQuadroFisico').style.display='none'">&times;</span></div>
            <div id="q-container-linhas" style="padding:20px;"></div>
            <div style="padding: 0 20px 20px 20px; text-align:right;">
                <button onclick="salvarQuadroFisico()" style="background:var(--ok); color:white; border:none; padding:12px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">GRAVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

<script>
    const headers = { "ngrok-skip-browser-warning": "69420", 'Cache-Control': 'no-cache' };
    function getUrlLimpa(url) { return url + '?nocache=' + new Date().getTime(); }

    // Máquinas Configuração
    const maqLpdcLista = [4, 5, 6, 7, 9, 11, 12, 13, 14, 15, 16]; 
    const maqMachLista = ["H-TOP 2", "H-TOP 3", "H-TOP 4", "H-TOP 5", "H-TOP 6", "H-TOP 7", "V-TOP 1", "V-TOP 2", "V-TOP 3"];
    const maqHpdcLista = [2, 7, 8, 9, 12, 13, 15, 16, 17, 18, 19, 20, 21, 22];

    let setorAtivo = ""; let telaAtual = "HOME";

    function abrirSetor(setor) {
        setorAtivo = setor; telaAtual = "DASHBOARD";
        document.getElementById('tela-home').style.display = "none"; document.getElementById('area-dashboard').style.display = "block";
        document.getElementById('resumo-topo').style.display = "flex";
        carregarMaquinas();
    }

    function voltarTela() {
        if(telaAtual === "HISTORICO") { abrirSetor(setorAtivo); } 
        else if(telaAtual === "DASHBOARD") { telaAtual = "HOME"; setorAtivo = ""; document.getElementById('area-dashboard').style.display = "none"; document.getElementById('tela-home').style.display = "flex"; }
    }

    function carregarMaquinas() {
        const pLpdc = document.getElementById('painel-lpdc');
        const pMach = document.getElementById('painel-mach');
        const pUnico = document.getElementById('painel-unico');
        
        pLpdc.innerHTML = "Carregando..."; pMach.innerHTML = "Carregando..."; pUnico.innerHTML = "Carregando...";
        
        if(setorAtivo === 'LPDC') {
            document.getElementById('layout-duplo').style.display = 'flex';
            document.getElementById('layout-unico').style.display = 'none';
        } else {
            document.getElementById('layout-duplo').style.display = 'none';
            document.getElementById('layout-unico').style.display = 'block';
            document.getElementById('tit-unico').style.display = 'none';
        }
        
        let mesHoje = new Date().getMonth() + 1; let diaHoje = new Date().getDate();

        Promise.all([ fetch(getUrlLimpa('/maquinas'), {headers}).then(r=>r.json()), fetch(getUrlLimpa('/obter-quadro'), {headers}).then(r=>r.json()) ]).then(([maquinas, quadroSalvo]) => {
            pLpdc.innerHTML = ""; pMach.innerHTML = ""; pUnico.innerHTML = "";
            let countTotal = 0; let countOk = 0; let countNc = 0;

            maquinas.forEach(m => {
                if (setorAtivo === "LPDC" && m.setor === "HPDC") return;
                if (setorAtivo === "HPDC" && m.setor !== "HPDC") return;
                
                countTotal++;
                const pendente = (!m.insp1 || !m.insp2); if (pendente) countNc++; else countOk++;

                let chave = (m.setor === "LPDC") ? `MAQ${m.id}` : m.id;
                let qMod = (quadroSalvo[chave]?.modelo || '---').toUpperCase(); 
                let qStat = (quadroSalvo[chave]?.status) || 'O';
                
                const div = document.createElement('div');
                div.className = `card-maq ${pendente ? 'stat-nc-border' : 'stat-ok-border'}`;
                
                div.innerHTML = `
                    <div style="margin-bottom: 10px; overflow:hidden;">
                        <span class="maq-nome">${m.nome}</span>
                        <span class="maq-modelo">${qMod}</span>
                    </div>
                    <div class="linha-info"><span>Quadro:</span> <b>${qStat}</b></div>
                    <div class="linha-info"><span>Turno:</span> <b>${m.turno_atual}º TURNO</b></div>
                    <div class="linha-info" style="margin-bottom:10px;"><span>Inspetor:</span> <b id="insp-nome-${m.id}" style="color:var(--blue);">Buscando...</b></div>
                    <div style="display:flex; gap:8px;">
                        <div class="s-${m.insp1 ? 'ok' : 'nc'}">1ª INSP ${m.insp1 ? '✅' : '❌'}</div>
                        <div class="s-${m.insp2 ? 'ok' : 'nc'}">2ª INSP ${m.insp2 ? '✅' : '❌'}</div>
                    </div>
                `;
                div.onclick=()=>carregarMeses(m.id,m.nome);
                
                // Distribuição na Tela Dividida
                if(setorAtivo === 'LPDC') {
                    if(m.nome.includes('MAQ')) pLpdc.appendChild(div);
                    else pMach.appendChild(div);
                } else {
                    pUnico.appendChild(div);
                }

                // Busca do Inspetor
                fetch(getUrlLimpa(`/maquinas/${m.id}/meses/${mesHoje}/dias/${diaHoje}/resumo`), {headers}).then(r=>r.json()).then(resumo => {
                    const dadosTurno = resumo[m.turno_atual.toString()];
                    let inspetorElem = document.getElementById(`insp-nome-${m.id}`);
                    if(dadosTurno) {
                        if(dadosTurno.insp2) { fetch(getUrlLimpa(`/ver-ficha/${m.id}/${mesHoje}/${diaHoje}/${m.turno_atual}/2`), {headers}).then(r=>r.json()).then(f => inspetorElem.textContent = f.inspetor.toUpperCase()); } 
                        else if(dadosTurno.insp1) { fetch(getUrlLimpa(`/ver-ficha/${m.id}/${mesHoje}/${diaHoje}/${m.turno_atual}/1`), {headers}).then(r=>r.json()).then(f => inspetorElem.textContent = f.inspetor.toUpperCase()); } 
                        else { inspetorElem.textContent = "Aguardando..."; }
                    } else { inspetorElem.textContent = "Aguardando..."; }
                }).catch(()=> document.getElementById(`insp-nome-${m.id}`).textContent = "---");
            });
            document.getElementById('num-total').textContent = countTotal;
            document.getElementById('num-ok').textContent = countOk;
            document.getElementById('num-nc').textContent = countNc;
        });
    }

    function carregarMeses(idM, nomeM) {
        telaAtual = "HISTORICO"; document.getElementById('resumo-topo').style.display = "none";
        document.getElementById('layout-duplo').style.display="none"; 
        document.getElementById('layout-unico').style.display="block";
        const pU = document.getElementById('painel-unico'); pU.innerHTML="";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses`), {headers}).then(r=>r.json()).then(d=>{ d.forEach(m=>{
            const div=document.createElement('div'); div.className="card-grande Azul"; div.textContent=m.nome;
            div.onclick=()=>carregarDias(idM,nomeM,m.id_mes,m.nome); pU.appendChild(div);
        })});
    }

    function carregarDias(idM, nomeM, idMes, nomeMes) {
        const pU = document.getElementById('painel-unico'); pU.innerHTML="";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses/${idMes}/dias`), {headers}).then(r=>r.json()).then(d=>{ d.forEach(it=>{
            const div=document.createElement('div'); div.className="card-grande Azul"; div.style.background = it.status_ficha==='OK'?'#10b981':'#ef4444'; div.style.borderColor = 'transparent'; div.textContent=`DIA ${it.dia}`;
            div.onclick=()=> abrirPainelTurnos(idM, nomeM, idMes, it.dia); pU.appendChild(div);
        })});
    }

    function abrirPainelTurnos(idM, nomeM, idMes, dia) {
        document.getElementById('grid-turnos-corpo').innerHTML = ""; document.getElementById('modalTurnos').style.display = "block";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses/${idMes}/dias/${dia}/resumo`), {headers}).then(r=>r.json()).then(resumo => {
            for(let t = 1; t <= 3; t++) {
                const dT = resumo[t.toString()];
                let b1 = dT.insp1 ? `<button class="btn-insp btn-feito" onclick="buscarEabrirFicha('${idM}', ${idMes}, ${dia}, ${t}, 1)">1ª Inspeção <span>✅ VER</span></button>` : `<button class="btn-insp btn-pendente">1ª Inspeção <span>Pendente</span></button>`;
                let b2 = dT.insp2 ? `<button class="btn-insp btn-feito" onclick="buscarEabrirFicha('${idM}', ${idMes}, ${dia}, ${t}, 2)">2ª Inspeção <span>✅ VER</span></button>` : `<button class="btn-insp btn-pendente">2ª Inspeção <span>Pendente</span></button>`;
                document.getElementById('grid-turnos-corpo').innerHTML += `<div style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #ccc;"><div style="font-weight:bold; color:var(--blue-dark); margin-bottom:10px; text-align:center;">${t}º TURNO</div>${b1}${b2}</div>`;
            }
        });
    }

    // --- VISUALIZAÇÃO DA FICHA & ASSINATURA AUTOMÁTICA CHEFE ---
    let fichaAtualExibida = {};

    function buscarEabrirFicha(idM, idMes, dia, turno, insp) {
        fetch(getUrlLimpa(`/ver-ficha/${idM}/${idMes}/${dia}/${turno}/${insp}`), {headers})
        .then(r=>r.json()).then(f=>{ fichaAtualExibida = f; abrirModal(f); });
    }

    function renderAssinaturaCaixa(objData, papel, mes) {
        if (objData?.assinatura) return `<img src="${objData.assinatura}" style="max-height:40px; mix-blend-mode:multiply; margin-bottom:5px;"><br><b style="font-size:10px;">${objData.nome.toUpperCase()}</b>`;
        
        if (papel === 'chefe') {
            let assinaturaSalva = localStorage.getItem('assinatura_chefe_mes_' + mes);
            if(assinaturaSalva) { return `<img src="${assinaturaSalva}" style="max-height:40px; mix-blend-mode:multiply; margin-bottom:5px;"><br><b style="font-size:10px; color:var(--ok);">CHEFE CQ (Auto)</b>`; }
            return `<button onclick="assinarComoChefe(${mes})" style="background:var(--blue); color:white; border:none; padding:6px 10px; border-radius:4px; font-weight:bold; font-size:10px; cursor:pointer;">ASSINAR MÊS</button>`;
        }
        return `<span style="color:#999; font-weight:bold;">Pendente</span>`;
    }

    function assinarComoChefe(mes) {
        Swal.fire({
            title: 'Assinatura da Chefia', html: '<p style="font-size:12px;">Ao assinar, todas as fichas deste mês constarão como validadas por você.</p><canvas id="cv-chefe" width="300" height="120" style="border:2px dashed #ccc; border-radius:8px; background:#f9f9f9; touch-action:none;"></canvas>',
            showCancelButton: true, confirmButtonText: 'Gravar Assinatura', confirmButtonColor: '#10b981',
            didOpen: () => {
                const cv = document.getElementById('cv-chefe'); const cx = cv.getContext('2d'); let d = false; cx.lineWidth = 3; cx.lineCap = 'round'; cx.strokeStyle = '#000';
                function getP(e) { const r = cv.getBoundingClientRect(); const cx_ = e.touches ? e.touches[0].clientX : e.clientX; const cy_ = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx_ - r.left, y: cy_ - r.top }; }
                cv.addEventListener('mousedown', (e)=>{ d=true; cx.beginPath(); cx.moveTo(getP(e).x, getP(e).y);}); cv.addEventListener('mousemove', (e)=>{ if(d){ cx.lineTo(getP(e).x, getP(e).y); cx.stroke();} }); cv.addEventListener('mouseup', ()=>d=false); cv.addEventListener('mouseout', ()=>d=false);
                cv.addEventListener('touchstart', (e)=>{ e.preventDefault(); d=true; cx.beginPath(); cx.moveTo(getP(e).x, getP(e).y);}, {passive:false}); cv.addEventListener('touchmove', (e)=>{ e.preventDefault(); if(d){ cx.lineTo(getP(e).x, getP(e).y); cx.stroke();} }, {passive:false}); cv.addEventListener('touchend', ()=>d=false);
            }
        }).then((res) => {
            if(res.isConfirmed) {
                const img = document.getElementById('cv-chefe').toDataURL(); localStorage.setItem('assinatura_chefe_mes_' + mes, img);
                Swal.fire('Validado!', 'Mês validado com sucesso.', 'success').then(() => abrirModal(fichaAtualExibida));
            }
        });
    }

    function editarFichaChefe() {
        Swal.fire({
            title: 'Área Restrita', text: 'Insira a senha da Chefia para editar esta ficha:', input: 'password', showCancelButton: true, confirmButtonText: 'Acessar', confirmButtonColor: '#f59e0b'
        }).then((result) => {
            if(result.isConfirmed) {
                if(result.value === 'admin' || result.value === 'chefe') { Swal.fire('Acesso Liberado!', 'Interface de edição ativada.', 'success'); } 
                else { Swal.fire('Erro', 'Senha incorreta.', 'error'); }
            }
        });
    }

    function abrirModal(f) {
        document.getElementById('m-tit').textContent = `Inspec. ${f.modelo} - ${f.turno}º TURNO (${f.inspecao}ª)`;
        document.getElementById('topo-ficha-print').innerHTML = `
            <div class="info-ficha">
                <div><b>Modelo:</b> ${f.modelo}</div><div><b>Máquina:</b> ${f.injetora}</div>
                <div><b>Data:</b> ${f.dia}/${f.mes}/26</div><div><b>Horário:</b> ${f.horario}</div>
            </div>
            <div class="chefia-container">
                <div class="chefia-box"><div class="chefia-tit">INSPETOR</div><div class="chefia-val">${renderAssinaturaCaixa({nome:f.inspetor, assinatura:f.assinatura_inspetor}, 'insp', f.mes)}</div></div>
                <div class="chefia-box"><div class="chefia-tit">ANALISTA</div><div class="chefia-val">${renderAssinaturaCaixa(f.analista, 'ana', f.mes)}</div></div>
                <div class="chefia-box"><div class="chefia-tit">CHEFE CQ</div><div class="chefia-val" id="caixa-assinatura-chefe">${renderAssinaturaCaixa(f.chefe_cq, 'chefe', f.mes)}</div></div>
            </div>`;
        const p1=document.getElementById('p1'); const p2=document.getElementById('p2'); p1.innerHTML=""; p2.innerHTML="";
        const chavesItens = Object.keys(f.itens_detalhados || {}); const metade = Math.ceil(chavesItens.length / 2);
        chavesItens.forEach((key, index) => {
            const d = f.itens_detalhados[key];
            let ctrl = (d.valor !== undefined) ? `<div class="valor-lido" style="background:${d.status==='C'? 'var(--ok)': 'var(--nc)'}">${d.valor}</div>` : `<div class="valor-lido" style="background:${d.status==='C'? 'var(--ok)': 'var(--nc)'}">${d.status}</div>`;
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #eee;"><span class="texto-item"><b>${index+1}.</b> ${d.nome}</span>${ctrl}</div>`;
            if(d.status === "NC") html += `<div style="font-size:11px; color:var(--nc); background:#fef2f2; padding:8px; border-radius:6px; margin-top:5px;"><b>FALHA:</b> ${d.descricao} <br><b style="color:#059669;">AÇÃO:</b> ${d.tratativa}</div>`;
            if(index < metade) p1.innerHTML += html; else p2.innerHTML += html;
        });
        document.getElementById('modalFicha').style.display="block";
    }

    function criarLinhaQuadro(nE, idI, vM, vS) { return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; background:white; padding:8px; border-radius:6px; border:1px solid #ccc;"><div style="flex:1; font-weight:bold; color:var(--blue-dark); text-transform:uppercase; font-size:13px;">${nE}</div><input type="text" style="flex:2; padding:8px; border:1px solid #ccc; border-radius:4px; font-weight:bold; text-transform:uppercase;" id="q-mod-${idI}" value="${vM}" placeholder="Modelo..." oninput="this.value = this.value.toUpperCase()"> <select style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-weight:bold; color:var(--blue);" id="q-stat-${idI}"><option value="O" ${vS==='O'?'selected':''}>O</option><option value="X" ${vS==='X'?'selected':''}>X</option><option value="⬜" ${vS==='⬜'?'selected':''}>⬜</option><option value="△" ${vS==='△'?'selected':''}>△</option></select></div>`; }

    function abrirModalQuadroFisico() {
        document.getElementById('modalQuadroFisico').style.display = 'block';
        fetch(getUrlLimpa('/obter-quadro'), {headers}).then(r=>r.json()).then(quadroSalvo => {
            const container = document.getElementById('q-container-linhas'); container.innerHTML = "";
            let html = '<div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">';
            if(setorAtivo === "LPDC") {
                let hL = '<div><h3 style="color:var(--blue); margin-top:0; border-bottom:2px solid var(--blue); padding-bottom:5px;">LPDC</h3>'; maqLpdcLista.forEach(m => { let id = `MAQ${m}`; hL += criarLinhaQuadro(`MAQ ${m}`, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hL += '</div>';
                let hM = '<div><h3 style="color:var(--blue); margin-top:0; border-bottom:2px solid var(--blue); padding-bottom:5px;">MACHEIRA</h3>'; maqMachLista.forEach(m => { let id = m.replace(" ", "").replace("-", ""); hM += criarLinhaQuadro(m, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hM += '</div>';
                html += hL + hM;
            } else {
                let hH = '<div style="grid-column: 1 / -1;"><h3 style="color:var(--blue); margin-top:0; border-bottom:2px solid var(--blue); padding-bottom:5px;">HPDC</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">'; maqHpdcLista.forEach(m => { let id = `HPDC${m}`; hH += criarLinhaQuadro(`INJ. ${m}`, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hH += '</div></div>';
                html += hH;
            }
            container.innerHTML = html + '</div>';
        });
    }

    function salvarQuadroFisico() {
        let dados = {};
        if(setorAtivo === "LPDC") {
            maqLpdcLista.forEach(m => { let id = `MAQ${m}`; dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
            maqMachLista.forEach(m => { let id = m.replace(" ", "").replace("-", ""); dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
        } else {
            maqHpdcLista.forEach(m => { let id = `HPDC${m}`; dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
        }
        fetch('/salvar-quadro', { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '69420' }, body: JSON.stringify(dados) })
        .then(r => r.json()).then(() => { Swal.fire('Sucesso!', 'Quadro atualizado.', 'success'); document.getElementById('modalQuadroFisico').style.display = 'none'; carregarMaquinas(); });
    }
</script>

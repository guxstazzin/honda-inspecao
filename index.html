<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Qualidade - Centro de Comando</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --blue: #0056b3; 
            --blue-dark: #003d82; 
            --bg: #f3f4f6; 
            --text: #1f2937; 
            --ok: #10b981; 
            --nc: #ef4444; 
            --panel: #ffffff;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* 🔥 Header Corporativo Azul */
        .header { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: white; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,86,179,0.3); }
        .header-logo { display: flex; align-items: center; gap: 15px; }
        .header-logo h1 { font-family: 'Montserrat', sans-serif; margin: 0; font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;}
        .header-logo h1 span { color: #a5f3fc; }
        .header-info { text-align: right; }
        .header-info h2 { margin: 0; font-size: 1.1rem; font-weight: 600; color: #fff; }
        .header-info p { margin: 3px 0 0 0; font-size: 12px; color: #a5f3fc; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;}

        /* 🔥 Resumo Superior (KPIs) */
        #resumo-topo { display: flex; gap: 20px; padding: 25px 30px; max-width: 1600px; margin: 0 auto; flex-wrap: wrap;}
        .kpi-card { background: var(--panel); flex: 1; min-width: 250px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border: 1px solid #e2e8f0;}
        .kpi-icon { background: #eff6ff; color: var(--blue); padding: 15px; border-radius: 12px; }
        .kpi-data h3 { margin: 0; font-size: 12px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-data h2 { margin: 5px 0 0 0; font-size: 2.2rem; font-weight: 800; color: var(--blue-dark); font-family: 'Montserrat', sans-serif; }
        
        .chart-box { background: var(--panel); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .chart-box h3 { margin: 0 0 10px 0; font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; }

        #tela-home { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 50px; padding: 0 20px; flex-wrap: wrap; }
        .btn-setor { background: var(--panel); border: 3px solid var(--blue); padding: 50px; border-radius: 20px; cursor: pointer; transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.1); width: 320px; text-align: center;}
        .btn-setor:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,86,179,0.2); background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border-color: transparent;}
        .btn-setor .material-icons { font-size: 50px; color: var(--blue); margin-bottom: 20px;}
        .btn-setor:hover .material-icons { color: white; }
        .btn-setor h2 { font-size: 2rem; margin: 0; font-weight: 900; font-family: 'Montserrat', sans-serif; }
        .btn-setor p { font-size: 1rem; font-weight: 600; margin: 10px 0 0 0; color: #64748b; }
        .btn-setor:hover p { color: #e2e8f0; }

        #area-dashboard { display: none; }
        .btn-voltar { display: block; margin: 0 0 20px 30px; padding: 10px 20px; background: #e2e8f0; color: #1f2937; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 12px; display: flex; align-items: center; gap: 8px;}
        .btn-voltar:hover { background: #cbd5e1; }

        /* 🔥 Design dos Cards das Máquinas SUPER CONTRASTADOS */
        .grid-painel { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; padding: 0 30px; max-width: 1600px; margin: 0 auto; }
        
        .card-maq { background: var(--panel); border-radius: 16px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 2px solid #e2e8f0; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; gap: 15px; position: relative; overflow: hidden;}
        .card-maq:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); border-color: var(--blue); }

        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;}
        .maq-nome { font-size: 1.4rem; font-weight: 900; color: var(--blue-dark); font-family: 'Montserrat', sans-serif; }
        .maq-modelo { font-size: 14px; background: #f1f5f9; color: var(--blue-dark); padding: 6px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; border: 1px solid #cbd5e1; }
        
        .maq-info-meio { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #475569; font-weight: 700; }
        .maq-turno { background: #eff6ff; color: var(--blue); padding: 5px 10px; border-radius: 4px; font-weight: 800; font-size: 11px;}
        
        /* Botões de C/NC no Dashboard */
        .status-pill { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; color: white;}
        .s-ok { background: linear-gradient(135deg, var(--ok), #059669); box-shadow: 0 4px 10px rgba(16,185,129,0.3); }
        .s-nc { background: linear-gradient(135deg, var(--nc), #dc2626); box-shadow: 0 4px 10px rgba(239,68,68,0.3); }
        
        .btn-float-quadro { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: white; border: none; padding: 18px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(0,86,179,0.4); z-index: 100; display: flex; align-items: center; gap: 10px; font-size: 14px; font-family: 'Montserrat', sans-serif; text-transform: uppercase;}
        .btn-float-quadro:hover { transform: scale(1.05); }

        /* 🔥 Modais */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 40px auto; width: 90%; max-width: 900px; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: left; }
        .modal-header { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: white; padding: 20px 25px; display: flex; align-items: center; justify-content: space-between; }
        .modal-header h2 { margin: 0; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
        .close { color: rgba(255,255,255,0.7); font-size: 28px; cursor: pointer; font-weight: bold;} .close:hover { color: white; }
        
        .card-grande.Azul { background: linear-gradient(135deg, var(--blue-dark), var(--blue)) !important; color: white !important; height: 120px; justify-content: center; font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 800; cursor:pointer; border-radius:12px; display:flex; align-items:center; box-shadow:0 10px 20px rgba(0,86,179,0.2);}
        .grid-turnos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; }
        .btn-insp { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; color: white; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-transform: uppercase;}
        .btn-feito { background: linear-gradient(135deg, var(--ok), #059669); box-shadow: 0 4px 10px rgba(16,185,129,0.3);} 
        .btn-pendente { background: linear-gradient(135deg, var(--nc), #dc2626); box-shadow: 0 4px 10px rgba(239,68,68,0.3);}

        /* Ficha Visualizada */
        .info-ficha { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 13px; flex: 1; color:#334155;}
        .chefia-container { flex: 1; display: flex; border: 1px solid #cbd5e1; border-radius: 12px; overflow: hidden; background: white;}
        .chefia-box { flex: 1; border-right: 1px solid #cbd5e1; text-align: center; display:flex; flex-direction:column;} .chefia-box:last-child { border-right: none; }
        .chefia-tit { background: #e2e8f0; padding: 8px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #cbd5e1; color:#1f2937; }
        .chefia-val { padding: 10px; flex:1; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-direction:column;}
        
        .texto-item { font-size: 13px; color: #1f2937; }
        .valor-lido { color: white; padding: 6px 12px; border-radius: 6px; font-weight: 800; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .btn-editar-ficha { background: #f59e0b; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; transition:0.2s;}
        .btn-editar-ficha:hover { background: #d97706; }

        @media (max-width: 1000px) { #resumo-topo { flex-direction: column; align-items: center; } .chart-box { width: 100%; } .grid-turnos { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    
    <div class="header">
        <div class="header-logo">
            <h1 style="color:#fff; background:white; color:var(--blue-dark); padding:5px 12px; border-radius:8px;">H</h1>
            <h1>HONDA <span>QUALIDADE</span></h1>
        </div>
        <div class="header-info">
            <h2>Gestão à Vista</h2>
            <p>FUNDIÇÃO - LPDC / HPDC</p>
        </div>
    </div>

    <div id="tela-home">
        <div class="btn-setor" onclick="abrirSetor('LPDC')">
            <span class="material-icons">precision_manufacturing</span>
            <h2>LPDC</h2>
            <p>Baixa Pressão</p>
        </div>
        <div class="btn-setor" onclick="abrirSetor('HPDC')">
            <span class="material-icons">speed</span>
            <h2>HPDC</h2>
            <p>Alta Pressão</p>
        </div>
    </div>

    <div id="area-dashboard">
        <button id="btnV" class="btn-voltar" onclick="voltarTela()"><span class="material-icons">arrow_back</span> Voltar p/ Início</button>
        
        <div id="resumo-topo">
            <div class="kpi-card">
                <div class="kpi-icon"><span class="material-icons">biotech</span></div>
                <div class="kpi-data"><h3 id="kpi-title-total">Total Máquinas</h3><h2 id="num-total">0</h2></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#ecfdf5; color:var(--ok);"><span class="material-icons">check_circle</span></div>
                <div class="kpi-data"><h3>Operação OK</h3><h2 id="num-ok" style="color:var(--ok);">0</h2></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon" style="background:#fef2f2; color:var(--nc);"><span class="material-icons">error</span></div>
                <div class="kpi-data"><h3>Com Pendência</h3><h2 id="num-nc" style="color:var(--nc);">0</h2></div>
            </div>
            <div class="chart-box">
                <h3>Conformidade Atual</h3>
                <canvas id="chartConformidade" width="150" height="150"></canvas>
            </div>
        </div>

        <div class="grid-painel" id="painel-unico" style="display: none; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));"></div>
        <div class="grid-painel" id="painel-esq"></div>

        <button class="btn-float-quadro" onclick="abrirModalQuadroFisico()"><span class="material-icons">edit_note</span> ATUALIZAR QUADRO</button>
    </div>

    <div id="modalTurnos" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header"><h2>Resumo do Dia</h2><span class="close" onclick="document.getElementById('modalTurnos').style.display='none'">&times;</span></div>
            <div class="grid-turnos" id="grid-turnos-corpo"></div>
        </div>
    </div>

    <div id="modalFicha" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="m-tit">Ficha</h2>
                <div style="display:flex; align-items:center; gap:15px;">
                    <button class="btn-editar-ficha" onclick="editarFichaChefe()"><span class="material-icons" style="font-size:16px;">edit</span> EDITAR</button>
                    <span class="material-icons" onclick="window.print()" style="cursor:pointer; color:white;" title="Imprimir">print</span>
                    <span class="close" onclick="document.getElementById('modalFicha').style.display='none'">&times;</span>
                </div>
            </div>
            <div style="padding:25px;" id="conteudo-ficha-print">
                <div style="display:flex; gap:20px; margin-bottom:20px; align-items:stretch;" id="topo-ficha-print"></div>
                <div style="display:flex; gap:20px; border-top:2px solid #e2e8f0; padding-top:20px;"><div style="flex:1" id="p1"></div><div style="flex:1" id="p2"></div></div>
            </div>
        </div>
    </div>

    <div id="modalQuadroFisico" class="modal">
        <div class="modal-content" style="max-width: 1000px; background: #f8fafc;">
            <div class="modal-header"><h2>Atualizar Quadro Manual</h2><span class="close" onclick="document.getElementById('modalQuadroFisico').style.display='none'">&times;</span></div>
            <div class="q-container" id="q-container-linhas" style="padding:25px;"></div>
            <div style="padding: 0 25px 25px 25px; text-align:right;">
                <button class="btn-salvar-quadro" onclick="salvarQuadroFisico()" style="background:var(--ok); color:white; border:none; padding:15px 25px; border-radius:8px; font-weight:800; cursor:pointer; font-size:14px; text-transform:uppercase; box-shadow:0 5px 15px rgba(16,185,129,0.3);">GRAVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

<script>
    const headers = { "ngrok-skip-browser-warning": "69420", 'Cache-Control': 'no-cache' };
    function getUrlLimpa(url) { return url + '?nocache=' + new Date().getTime(); }

    // 🔥 MÁQUINAS ATUALIZADAS
    const maqLpdcLista = [4, 5, 6, 7, 9, 11, 12, 13, 14, 15, 16]; 
    const maqMachLista = ["H-TOP 2", "H-TOP 3", "H-TOP 4", "H-TOP 5", "H-TOP 6", "H-TOP 7", "V-TOP 1", "V-TOP 2", "V-TOP 3"];
    const maqHpdcLista = [2, 7, 8, 9, 12, 13, 15, 16, 17, 18, 19, 20, 21, 22];

    let setorAtivo = ""; let telaAtual = "HOME"; let chartInstance = null;

    function abrirSetor(setor) {
        setorAtivo = setor; telaAtual = "DASHBOARD";
        document.getElementById('tela-home').style.display = "none"; document.getElementById('area-dashboard').style.display = "block";
        document.getElementById('resumo-topo').style.display = "flex";
        document.getElementById('kpi-title-total').textContent = (setor === "LPDC") ? "Máquinas LPDC/Mach." : "Injetoras HPDC";
        carregarMaquinas();
    }

    function voltarTela() {
        if(telaAtual === "HISTORICO") { abrirSetor(setorAtivo); } 
        else if(telaAtual === "DASHBOARD") { telaAtual = "HOME"; setorAtivo = ""; document.getElementById('area-dashboard').style.display = "none"; document.getElementById('tela-home').style.display = "flex"; }
    }

    function atualizarKPIsEGrafico(total, ok, nc) {
        document.getElementById('num-total').textContent = total; document.getElementById('num-ok').textContent = ok; document.getElementById('num-nc').textContent = nc;
        const ctx = document.getElementById('chartConformidade').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        const perc = total > 0 ? Math.round((ok / total) * 100) : 0;
        chartInstance = new Chart(ctx, {
            type: 'doughnut', data: { labels: ['OK', 'PEND'], datasets: [{ data: [ok, nc], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0, cutout: '75%' }] },
            options: { responsive: false, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: true } }, animation: { duration: 1000 } },
            plugins: [{
                id: 'textCenter',
                beforeDraw: function(chart) {
                    const width = chart.width, height = chart.height, ctx = chart.ctx; ctx.restore(); ctx.font = "900 2rem Montserrat"; ctx.textBaseline = "middle";
                    ctx.fillStyle = (perc >= 90) ? '#10b981' : (perc >= 75 ? '#f59e0b' : '#ef4444');
                    const text = perc + "%", textX = Math.round((width - ctx.measureText(text).width) / 2), textY = height / 2; ctx.fillText(text, textX, textY); ctx.save();
                }
            }]
        });
    }

    function carregarMaquinas() {
        const painel = document.getElementById('painel-esq'); painel.innerHTML = "Carregando...";
        document.getElementById('painel-unico').style.display = "none"; painel.style.display = "grid";
        
        let mesHoje = new Date().getMonth() + 1; let diaHoje = new Date().getDate();

        Promise.all([ fetch(getUrlLimpa('/maquinas'), {headers}).then(r=>r.json()), fetch(getUrlLimpa('/obter-quadro'), {headers}).then(r=>r.json()) ]).then(([maquinas, quadroSalvo]) => {
            painel.innerHTML = ""; let countTotal = 0; let countOk = 0; let countNc = 0;

            maquinas.forEach(m => {
                if (setorAtivo === "LPDC" && m.setor === "HPDC") return;
                if (setorAtivo === "HPDC" && m.setor !== "HPDC") return;
                
                countTotal++;
                const pendente = (!m.insp1 || !m.insp2); if (pendente) countNc++; else countOk++;

                let chave = (m.setor === "LPDC") ? `MAQ${m.id}` : m.id;
                let qMod = (quadroSalvo[chave]?.modelo || '---').toUpperCase(); // 🔥 FORÇA MAIÚSCULA
                let qStat = (quadroSalvo[chave]?.status) || 'O';
                
                const div = document.createElement('div');
                div.className = `card-maq`;
                
                div.innerHTML = `
                    <div class="card-header">
                        <span class="maq-nome">${m.nome}</span>
                        <span class="maq-modelo">${qMod}</span>
                    </div>
                    <div class="maq-info-meio">
                        <div>Status Quadro: <b style="font-size:14px; color:var(--blue);">${qStat}</b></div>
                        <div class="maq-turno">${m.turno_atual}º TURNO</div>
                    </div>
                    <div style="font-size:11px; color:#64748b; margin-top:-5px;">Inspetor: <b id="insp-nome-${m.id}" style="color:#1f2937;">Buscando...</b></div>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <div class="status-pill ${m.insp1 ? 's-ok' : 's-nc'}">1ª INSP ${m.insp1 ? '✅' : '❌'}</div>
                        <div class="status-pill ${m.insp2 ? 's-ok' : 's-nc'}">2ª INSP ${m.insp2 ? '✅' : '❌'}</div>
                    </div>
                `;
                div.onclick=()=>carregarMeses(m.id,m.nome);
                painel.appendChild(div);

                // 🔥 BUSCA O NOME DO INSPETOR DE FORMA INTELIGENTE
                fetch(getUrlLimpa(`/maquinas/${m.id}/meses/${mesHoje}/dias/${diaHoje}/resumo`), {headers}).then(r=>r.json()).then(resumo => {
                    const dadosTurno = resumo[m.turno_atual.toString()];
                    let inspetorElem = document.getElementById(`insp-nome-${m.id}`);
                    if(dadosTurno) {
                        if(dadosTurno.insp2) {
                            fetch(getUrlLimpa(`/ver-ficha/${m.id}/${mesHoje}/${diaHoje}/${m.turno_atual}/2`), {headers}).then(r=>r.json()).then(f => inspetorElem.textContent = f.inspetor.toUpperCase());
                        } else if(dadosTurno.insp1) {
                            fetch(getUrlLimpa(`/ver-ficha/${m.id}/${mesHoje}/${diaHoje}/${m.turno_atual}/1`), {headers}).then(r=>r.json()).then(f => inspetorElem.textContent = f.inspetor.toUpperCase());
                        } else { inspetorElem.textContent = "Aguardando 1ª Inspec."; }
                    } else { inspetorElem.textContent = "Sem dados"; }
                }).catch(()=> document.getElementById(`insp-nome-${m.id}`).textContent = "---");
            });
            atualizarKPIsEGrafico(countTotal, countOk, countNc);
        });
    }

    function carregarMeses(idM, nomeM) {
        telaAtual = "HISTORICO"; document.getElementById('resumo-topo').style.display = "none";
        document.getElementById('painel-esq').style.display="none"; 
        const pU = document.getElementById('painel-unico'); pU.style.display="grid"; pU.innerHTML="";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses`), {headers}).then(r=>r.json()).then(d=>{ d.forEach(m=>{
            const div=document.createElement('div'); div.className="card-grande Azul"; div.textContent=m.nome;
            div.onclick=()=>carregarDias(idM,nomeM,m.id_mes,m.nome); pU.appendChild(div);
        })});
    }

    function carregarDias(idM, nomeM, idMes, nomeMes) {
        const pU = document.getElementById('painel-unico'); pU.innerHTML="";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses/${idMes}/dias`), {headers}).then(r=>r.json()).then(d=>{ d.forEach(it=>{
            const div=document.createElement('div'); div.className="card-grande Azul"; div.style.background = it.status_ficha==='OK'?'linear-gradient(135deg, var(--ok), #059669)':'linear-gradient(135deg, var(--nc), #dc2626)'; div.textContent=`DIA ${it.dia}`;
            div.onclick=()=> abrirPainelTurnos(idM, nomeM, idMes, it.dia); pU.appendChild(div);
        })});
    }

    function abrirPainelTurnos(idM, nomeM, idMes, dia) {
        document.getElementById('grid-turnos-corpo').innerHTML = ""; document.getElementById('modalTurnos').style.display = "block";
        fetch(getUrlLimpa(`/maquinas/${idM}/meses/${idMes}/dias/${dia}/resumo`), {headers}).then(r=>r.json()).then(resumo => {
            for(let t = 1; t <= 3; t++) {
                const dT = resumo[t.toString()];
                let b1 = dT.insp1 ? `<button class="btn-insp btn-feito" onclick="buscarEabrirFicha('${idM}', ${idMes}, ${dia}, ${t}, 1)">1ª Inspeção <span>✅ VER</span></button>` : `<button class="btn-insp btn-pendente">1ª Inspeção <span>Pendente</span></button>`;
                let b2 = dT.insp2 ? `<button class="btn-insp btn-feito" onclick="buscarEabrirFicha('${idM}', ${idMes}, ${dia}, ${t}, 2)">2ª Inspeção <span>✅ VER</span></button>` : `<button class="btn-insp btn-pendente">2ª Inspeção <span>Pendente</span></button>`;
                document.getElementById('grid-turnos-corpo').innerHTML += `<div style="background:#f8fafc; padding:20px; border-radius:12px; border:1px solid #e2e8f0; box-shadow:0 4px 10px rgba(0,0,0,0.03);"><div style="font-weight:900; color:var(--blue-dark); margin-bottom:15px; text-align:center; font-family:'Montserrat';">${t}º TURNO</div>${b1}${b2}</div>`;
            }
        });
    }

    // --- VISUALIZAÇÃO DA FICHA & ASSINATURA DO CHEFE ETERNA ---
    let fichaAtualExibida = {};

    function buscarEabrirFicha(idM, idMes, dia, turno, insp) {
        fetch(getUrlLimpa(`/ver-ficha/${idM}/${idMes}/${dia}/${turno}/${insp}`), {headers})
        .then(r=>r.json()).then(f=>{ fichaAtualExibida = f; abrirModal(f); });
    }

    function renderAssinaturaCaixa(objData, papel, mes) {
        if (objData?.assinatura) return `<img src="${objData.assinatura}" style="max-height:40px; mix-blend-mode:multiply; margin-bottom:5px;"><br><b style="font-size:10px;">${objData.nome.toUpperCase()}</b>`;
        
        // 🔥 MAGIA DA ASSINATURA DO CHEFE PRO MÊS INTEIRO
        if (papel === 'chefe') {
            let assinaturaSalva = localStorage.getItem('assinatura_chefe_mes_' + mes);
            if(assinaturaSalva) {
                return `<img src="${assinaturaSalva}" style="max-height:40px; mix-blend-mode:multiply; margin-bottom:5px;"><br><b style="font-size:10px; color:var(--ok);">CHEFE CQ (Auto)</b>`;
            }
            return `<button onclick="assinarComoChefe(${mes})" style="background:var(--blue); color:white; border:none; padding:8px; border-radius:6px; font-weight:800; font-size:10px; cursor:pointer;">ASSINAR MÊS</button>`;
        }
        return `<span style="color:#94a3b8; font-weight:700;">Pendente</span>`;
    }

    function assinarComoChefe(mes) {
        Swal.fire({
            title: 'Assinatura da Chefia',
            html: '<p style="font-size:12px;">Ao assinar, todas as fichas deste mês constarão como validadas por você.</p><canvas id="cv-chefe" width="300" height="120" style="border:2px dashed #ccc; border-radius:8px; background:#f9f9f9; touch-action:none;"></canvas>',
            showCancelButton: true, confirmButtonText: 'Gravar Assinatura', confirmButtonColor: '#10b981',
            didOpen: () => {
                const cv = document.getElementById('cv-chefe'); const cx = cv.getContext('2d'); let d = false; cx.lineWidth = 3; cx.lineCap = 'round'; cx.strokeStyle = '#000';
                function getP(e) { const r = cv.getBoundingClientRect(); const cx_ = e.touches ? e.touches[0].clientX : e.clientX; const cy_ = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx_ - r.left, y: cy_ - r.top }; }
                cv.addEventListener('mousedown', (e)=>{ d=true; cx.beginPath(); cx.moveTo(getP(e).x, getP(e).y);}); cv.addEventListener('mousemove', (e)=>{ if(d){ cx.lineTo(getP(e).x, getP(e).y); cx.stroke();} }); cv.addEventListener('mouseup', ()=>d=false); cv.addEventListener('mouseout', ()=>d=false);
                cv.addEventListener('touchstart', (e)=>{ e.preventDefault(); d=true; cx.beginPath(); cx.moveTo(getP(e).x, getP(e).y);}, {passive:false}); cv.addEventListener('touchmove', (e)=>{ e.preventDefault(); if(d){ cx.lineTo(getP(e).x, getP(e).y); cx.stroke();} }, {passive:false}); cv.addEventListener('touchend', ()=>d=false);
            }
        }).then((res) => {
            if(res.isConfirmed) {
                const img = document.getElementById('cv-chefe').toDataURL();
                localStorage.setItem('assinatura_chefe_mes_' + mes, img);
                Swal.fire('Validado!', 'Mês validado com sucesso.', 'success').then(() => abrirModal(fichaAtualExibida));
            }
        });
    }

    function editarFichaChefe() {
        Swal.fire({
            title: 'Área Restrita', text: 'Insira a senha da Chefia para editar esta ficha:',
            input: 'password', showCancelButton: true, confirmButtonText: 'Acessar', confirmButtonColor: '#f59e0b'
        }).then((result) => {
            if(result.isConfirmed) {
                if(result.value === 'admin' || result.value === 'chefe') {
                    Swal.fire('Acesso Liberado!', 'A interface de edição foi ativada. (Nota da Engenharia: A gravação no banco de dados será plugada na próxima atualização do Cérebro Python!)', 'success');
                } else { Swal.fire('Erro', 'Senha incorreta.', 'error'); }
            }
        });
    }

    function abrirModal(f) {
        document.getElementById('m-tit').textContent = `Inspec. ${f.modelo} - ${f.turno}º TURNO (${f.inspecao}ª)`;
        document.getElementById('topo-ficha-print').innerHTML = `
            <div class="info-ficha">
                <div><b>Modelo:</b> ${f.modelo}</div><div><b>Máquina:</b> ${f.injetora}</div>
                <div><b>Data:</b> ${f.dia}/${f.mes}/26</div><div><b>Horário:</b> ${f.horario}</div>
            </div>
            <div class="chefia-container">
                <div class="chefia-box"><div class="chefia-tit">INSPETOR</div><div class="chefia-val">${renderAssinaturaCaixa({nome:f.inspetor, assinatura:f.assinatura_inspetor}, 'insp', f.mes)}</div></div>
                <div class="chefia-box"><div class="chefia-tit">ANALISTA</div><div class="chefia-val">${renderAssinaturaCaixa(f.analista, 'ana', f.mes)}</div></div>
                <div class="chefia-box"><div class="chefia-tit">CHEFE CQ</div><div class="chefia-val" id="caixa-assinatura-chefe">${renderAssinaturaCaixa(f.chefe_cq, 'chefe', f.mes)}</div></div>
            </div>`;
        const p1=document.getElementById('p1'); const p2=document.getElementById('p2'); p1.innerHTML=""; p2.innerHTML="";
        const chavesItens = Object.keys(f.itens_detalhados || {}); const metade = Math.ceil(chavesItens.length / 2);
        chavesItens.forEach((key, index) => {
            const d = f.itens_detalhados[key];
            let ctrl = (d.valor !== undefined) ? `<div class="valor-lido" style="background:${d.status==='C'? 'var(--ok)': 'var(--nc)'}">${d.valor}</div>` : `<div class="valor-lido" style="background:${d.status==='C'? 'var(--ok)': 'var(--nc)'}">${d.status}</div>`;
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #e2e8f0;"><span class="texto-item"><b>${index+1}.</b> ${d.nome}</span>${ctrl}</div>`;
            if(d.status === "NC") html += `<div style="font-size:11px; color:var(--nc); background:#fef2f2; padding:8px; border-radius:6px; margin-top:5px; border:1px solid #fecaca;"><b>DEFEITO:</b> ${d.descricao} <br><b style="color:#059669;">AÇÃO:</b> ${d.tratativa}</div>`;
            if(index < metade) p1.innerHTML += html; else p2.innerHTML += html;
        });
        document.getElementById('modalFicha').style.display="block";
    }

    // --- QUADRO FÍSICO COM FORÇA MAIÚSCULA ---
    function criarLinhaQuadro(nE, idI, vM, vS) { return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; background:white; padding:8px; border-radius:8px; border:1px solid #e2e8f0;"><div style="flex:1; font-weight:800; color:var(--blue-dark); text-transform:uppercase; font-size:13px;">${nE}</div><input type="text" style="flex:2; padding:10px; border:1px solid #cbd5e1; border-radius:6px; font-weight:700; text-transform:uppercase;" id="q-mod-${idI}" value="${vM}" placeholder="Modelo..." oninput="this.value = this.value.toUpperCase()"> <select style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:6px; font-weight:800; color:var(--blue);" id="q-stat-${idI}"><option value="O" ${vS==='O'?'selected':''}>O</option><option value="X" ${vS==='X'?'selected':''}>X</option><option value="⬜" ${vS==='⬜'?'selected':''}>⬜</option><option value="△" ${vS==='△'?'selected':''}>△</option></select></div>`; }

    function abrirModalQuadroFisico() {
        document.getElementById('modalQuadroFisico').style.display = 'block';
        fetch(getUrlLimpa('/obter-quadro'), {headers}).then(r=>r.json()).then(quadroSalvo => {
            const container = document.getElementById('q-container-linhas'); container.innerHTML = "";
            let html = '<div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">';
            if(setorAtivo === "LPDC") {
                let hL = '<div><h3 style="color:var(--blue); margin-top:0; font-family:\'Montserrat\'; border-bottom:2px solid var(--blue); padding-bottom:5px;">LPDC</h3>'; maqLpdcLista.forEach(m => { let id = `MAQ${m}`; hL += criarLinhaQuadro(`MAQ ${m}`, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hL += '</div>';
                let hM = '<div><h3 style="color:var(--blue); margin-top:0; font-family:\'Montserrat\'; border-bottom:2px solid var(--blue); padding-bottom:5px;">MACHEIRA</h3>'; maqMachLista.forEach(m => { let id = m.replace(" ", "").replace("-", ""); hM += criarLinhaQuadro(m, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hM += '</div>';
                html += hL + hM;
            } else {
                let hH = '<div style="grid-column: 1 / -1;"><h3 style="color:var(--blue); margin-top:0; font-family:\'Montserrat\'; border-bottom:2px solid var(--blue); padding-bottom:5px;">HPDC</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">'; maqHpdcLista.forEach(m => { let id = `HPDC${m}`; hH += criarLinhaQuadro(`INJ. ${m}`, id, quadroSalvo[id]?.modelo || '', quadroSalvo[id]?.status || 'O'); }); hH += '</div></div>';
                html += hH;
            }
            container.innerHTML = html + '</div>';
        });
    }

    function salvarQuadroFisico() {
        let dados = {};
        if(setorAtivo === "LPDC") {
            maqLpdcLista.forEach(m => { let id = `MAQ${m}`; dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
            maqMachLista.forEach(m => { let id = m.replace(" ", "").replace("-", ""); dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
        } else {
            maqHpdcLista.forEach(m => { let id = `HPDC${m}`; dados[id] = { modelo: document.getElementById(`q-mod-${id}`).value.toUpperCase(), status: document.getElementById(`q-stat-${id}`).value }; });
        }
        fetch('/salvar-quadro', { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '69420' }, body: JSON.stringify(dados) })
        .then(r => r.json()).then(() => { Swal.fire('Sucesso!', 'Quadro atualizado.', 'success'); document.getElementById('modalQuadroFisico').style.display = 'none'; carregarMaquinas(); });
    }
</script>
